<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Screenshot Drop — Editor</title>
    <link rel="stylesheet" href="styles/annotate.css" />
  </head>
  <body>
    <header class="editor-bar">
      <div class="editor-bar__group">
        <span class="brand-mark editor-bar__mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 8.5V6.5A2.5 2.5 0 0 1 6.5 4h2M15.5 4h2A2.5 2.5 0 0 1 20 6.5v2M20 15.5v2a2.5 2.5 0 0 1-2.5 2.5h-2M8.5 20h-2A2.5 2.5 0 0 1 4 17.5v-2" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </span>
      </div>

      <span class="editor-bar__sep" aria-hidden="true"></span>

      <div id="toolbar" class="editor-bar__group" role="toolbar" aria-label="Annotation tools"></div>

      <span class="editor-bar__sep" aria-hidden="true"></span>

      <div class="editor-bar__group">
        <button id="color-toggle" class="swatch" type="button" title="Cycle color (C)" aria-label="Cycle annotation color (C)"></button>
      </div>

      <span class="editor-bar__sep" aria-hidden="true"></span>

      <div class="editor-bar__group thickness" title="Stroke thickness">
        <span class="thickness__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-linecap="round">
            <path d="M4 6.5h16" stroke-width="1.25" />
            <path d="M4 12h16" stroke-width="2.5" />
            <path d="M4 18h16" stroke-width="4" />
          </svg>
        </span>
        <input id="stroke-width" class="range" type="range" min="1" max="12" step="1" value="3" aria-label="Stroke thickness" />
        <span id="stroke-width-val" class="kbd thickness__val" aria-hidden="true">3</span>
      </div>

      <span class="editor-bar__sep" aria-hidden="true"></span>

      <div class="editor-bar__group">
        <button id="undo" class="tool-text" type="button" title="Undo (Ctrl+Z)">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 14L4 9l5-5" /><path d="M4 9h11a5 5 0 0 1 0 10h-1" /></svg>
          <span>Undo</span>
        </button>
        <button id="clear" class="tool-text" type="button" title="Clear all annotations">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2M6 7l1 12a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-12" /></svg>
          <span>Clear</span>
        </button>
      </div>

      <div class="editor-bar__spacer"></div>

      <div class="editor-bar__group editor-bar__hints" aria-hidden="true">
        <span class="hintline"><kbd class="kbd">1</kbd><span class="hintline__dash">–</span><kbd class="kbd">6</kbd> tools</span>
        <span class="hintline"><kbd class="kbd">C</kbd> color</span>
        <span class="hintline"><kbd class="kbd">⌘</kbd><kbd class="kbd">Z</kbd> undo</span>
      </div>
    </header>

    <main class="stage">
      <div class="stage__frame">
        <canvas id="canvas"></canvas>
      </div>
    </main>

    <footer class="dispatch" id="save-bar">
      <div class="dispatch__fields">
        <div class="field">
          <label class="label" for="destination">Destination</label>
          <div class="select-wrap">
            <select id="destination"></select>
            <svg class="select-wrap__chev" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6" /></svg>
          </div>
        </div>
        <div class="field field--grow">
          <label class="label" for="shortname">Short name <span class="label__opt">optional</span></label>
          <input id="shortname" class="input" type="text" autocomplete="off" spellcheck="false" placeholder="e.g. login-bug" />
        </div>
      </div>
      <button id="save" class="btn btn-primary btn-lg" type="button">
        <span class="save__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13" /><path d="M22 2l-7 20-4-9-9-4z" /></svg>
        </span>
        <span id="save-label">Save &amp; copy</span>
      </button>
    </footer>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="annotate.entry.js"></script>
  </body>
</html>
